<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator Web Application</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="calculator">
    <div class="display">
      <div id="previous" class="previous"></div>
      <div id="current" class="current">0</div>
    </div>

    <div class="buttons">

      <!-- Scientific row -->
      <button class="btn sci" data-insert="(">(</button>
      <button class="btn sci" data-insert=")">)</button>
      <button class="btn sci" data-insert="pi">π</button>
      <button class="btn sci" data-insert="e">e</button>

      <button class="btn sci" data-insert="sqrt(">√</button>
      <button class="btn sci" data-insert="pow2(">x²</button>
      <button class="btn sci" data-insert="log(">log</button>
      <button class="btn sci" data-insert="ln(">ln</button>

      <button class="btn sci" data-insert="sin(">sin</button>
      <button class="btn sci" data-insert="cos(">cos</button>
      <button class="btn sci" data-insert="tan(">tan</button>
      <button class="btn operator" data-value="/">÷</button>

      <!-- Normal rows -->
      <button class="btn special" data-action="clear">AC</button>
      <button class="btn special" data-action="delete">DEL</button>
      <button class="btn special" data-action="percent">%</button>
      <button class="btn operator" data-value="*">×</button>

      <button class="btn" data-value="7">7</button>
      <button class="btn" data-value="8">8</button>
      <button class="btn" data-value="9">9</button>
      <button class="btn operator" data-value="-">−</button>

      <button class="btn" data-value="4">4</button>
      <button class="btn" data-value="5">5</button>
      <button class="btn" data-value="6">6</button>
      <button class="btn operator" data-value="+">+</button>

      <button class="btn" data-value="1">1</button>
      <button class="btn" data-value="2">2</button>
      <button class="btn" data-value="3">3</button>
      <button class="btn equal" data-action="equals">=</button>

      <button class="btn zero" data-value="0">0</button>
      <button class="btn" data-value=".">.</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
